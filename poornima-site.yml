apiVersion: v1
kind: ConfigMap
metadata:
  name: poornima-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Poornima | Professional Portfolio</title>
        <style>
            body { font-family: sans-serif; line-height: 1.6; color: #333; background-color: #fdf2f8; padding: 20px; }
            .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #db2777; }
            h1 { color: #be185d; text-align: center; }
            .highlight { font-weight: bold; color: #9d174d; }
            .couple-note { font-style: italic; background: #fff1f2; padding: 15px; border-left: 5px solid #fb7185; margin-top: 20px; border-radius: 10px; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Poornima L. Godi</h1>
            <p style="text-align:center;"><strong>Commerce Professional | Financial Analyst</strong></p>
            <div style="margin-bottom: 20px;">
                <h3>🎓 Academic Background</h3>
                <p>A proud <span class="highlight">B.Com Graduate</span> specialized in Business Management and Accounting.</p>
            </div>
            <div class="couple-note">
                "Behind every successful deployment is a strong partnership." <br><br>
                Managed and hosted by her fiancé, <strong>Laxman Godi</strong>. Our journey from <strong>Akkisagar-Betageri</strong> to Bengaluru is just beginning!
            </div>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poornima-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poornima-site
  template:
    metadata:
      labels:
        app: poornima-site
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: poornima-html
---
apiVersion: v1
kind: Service
metadata:
  name: poornima-service
spec:
  selector:
    app: poornima-site
  ports:
    - port: 80
      targetPort: 80
